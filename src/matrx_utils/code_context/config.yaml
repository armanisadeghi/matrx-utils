exclude_directories:
  exact:
    # Version control
    - ".git"
    - ".github"
    - ".git-rewrite"
    # Python virtual environments
    - "venv"
    - ".venv"
    # JS/Node dependencies
    - "node_modules"
    # Python bytecode
    - "__pycache__"
    - ".pytest_cache"
    # Build artifacts - JS
    - ".next"
    - "dist"
    - "build"
    - "out"
    - ".parcel-cache"
    - ".turbo"
    - ".nuxt"
    - ".expo"
    # Build artifacts - Python
    - "eggs"
    - "lib64"
    # IDE settings
    - ".idea"
    - ".vscode"
    - ".history"
    # OS artifacts
    - ".DS_Store"
    - "Thumbs.db"
    # Coverage / test output
    - ".coverage"
    - "coverage"
    - "htmlcov"
    - "test-results"
    # CI/CD
    - ".circleci"
    - ".travis"
    - ".azure"
    - ".docker"
    # Linter caches
    - ".eslintcache"
    - ".stylelintcache"
    - ".cache"
    - ".storybook"
    # Common project-specific noise
    - "migrations"
    - "staticfiles"
    - "static"
    - "media"
    - "assets"
    - "uploads"
    - "templates"
    - "docs"
    - "playground"
    - "scratches"
    - "consoles"
    - "external libraries"
    - "logs"
    - "tmp"
    - "new_dir"
    - "previous_versions"
    - "bin"

  containing:
    # Directories whose names contain these substrings (word-boundary matched)
    - "temp"

exclude_files:
  exact:
    - "debug.log"
    - "package-lock.json"
    - "yarn.lock"
    - "next-env.d.ts"
    - ".nvmrc"
    - ".npmrc"
    - ".jshintrc"
    - ".gitignore"
    - ".editorconfig"
    - ".env"
    - "README.md"
    - "Dockerfile"
    - "Makefile"

  containing:
    # Filenames whose names contain these substrings (word-boundary matched)
    []

exclude_extensions:
  - ".xml"
  - ".py-tpl"
  - ".map"
  - ".tmp"
  - ".swp"
  - ".log"
  - ".jpg"
  - ".jpeg"
  - ".png"
  - ".gif"
  - ".svg"
  - ".ico"
  - ".avif"
  - ".webp"
  - ".tiff"
  - ".sketch"
  - ".woff"
  - ".woff2"
  - ".eot"
  - ".ttf"
  - ".otf"
  - ".gz"
  - ".zip"
  - ".bin"
  - ".wav"
  - ".mp3"
  - ".mp4"
  - ".pdf"
  - ".csv"
  - ".txt"
  - ".md"
  - ".MD"
  - ".mdx"
  - ".css"
  - ".scss"
  - ".sass"
  - ".less"
  - ".json"
  - ".yaml"
  - ".yml"
  - ".toml"
  - ".ini"
  - ".conf"
  - ".cfg"
  - ".env"
  - ".local"
  - ".lock"
  - ".sql"
  - ".pkl"
  - ".db"
  - ".sqlite"
  - ".jsonl"
  - ".tsbuildinfo"
  - ".webmanifest"
  - ".mjs"
  - ".cjs"
  - ".bak"
  - ".orig"
  - ".icns"
  - ".plist"
  - ".nib"
  - ".strings"
