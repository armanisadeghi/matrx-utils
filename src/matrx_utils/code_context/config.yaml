# ---------------------------------------------------------------------------
# Call graph — project-specific noise suppression
# These names are merged with the built-in _DEFAULT_CALL_GRAPH_IGNORE list.
# Add project-level debug/print utilities that appear everywhere but carry no signal.
# ---------------------------------------------------------------------------
call_graph_project_noise:
  - "vcprint"
  - "clear_terminal"

# ---------------------------------------------------------------------------
# Allowlists — if non-empty, these act as whitelists (all other values excluded).
# ---------------------------------------------------------------------------

# Only files with these extensions are included. Overrides exclude_extensions.
include_extensions: []

# Only directories with these exact names are traversed.
include_directories: []

# Only files with these exact names are included.
include_files: []

# ---------------------------------------------------------------------------
# Output settings
# ---------------------------------------------------------------------------

output:
  save_combined: true
  save_individual: false
  export_directory: "./output"
  # "tree_only"  — directory tree only, no file content          (~1% tokens)
  # "signatures" — function/class/method signatures, no bodies  (~5-10% tokens)
  # "clean"      — full content with comments stripped           (~70-80% tokens)
  # "original"   — full content, completely unmodified            (100% tokens)
  output_mode: "clean"
  show_all_tree_directories: false
  prune_empty_directories: false
  include_text_output: true      # write ASCII tree .txt alongside JSON structure file
  project_root_display: true     # show path relative to project root in tree header

# ---------------------------------------------------------------------------
# Named presets — reusable profiles, applied on top of base config above.
# ---------------------------------------------------------------------------
#
# Usage in CodeContextBuilder: preset="python_only"
#
# Preset fields:
#   override: false       — if true, replaces base lists; if false, merges into them
#   exclude_directories, include_extensions, etc. — same structure as base config
#   output:               — optional output setting overrides
#
presets:
  python_only:
    override: false
    include_extensions:
      - ".py"
    output:
      output_mode: "signatures"

  frontend:
    override: false
    include_extensions:
      - ".ts"
      - ".tsx"
      - ".js"
      - ".jsx"
    output:
      output_mode: "clean"

  tree_overview:
    override: false
    output:
      output_mode: "tree_only"
      show_all_tree_directories: true
      prune_empty_directories: true
